<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>JobSpy — History</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    theme: { extend: {
      colors: { primary: '#bcbdfb', 'bg-light': '#f5f6f8' },
      fontFamily: { display: ['Plus Jakarta Sans','sans-serif'] },
    }}
  }
</script>
<style>
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f6f8; }
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; vertical-align:middle; }
  .spinner { border:3px solid #e2e8f0; border-top:3px solid #bcbdfb; border-radius:50%;
    width:32px; height:32px; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .session-card:hover { transform:translateY(-2px); box-shadow: 0 8px 24px #bcbdfb22; }
</style>
</head>
<body class="min-h-screen">

<!-- ── Header ────────────────────────────────────────────────────────────── -->
<header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-indigo-100 px-6 py-3">
  <div class="max-w-7xl mx-auto flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2">
      <div class="bg-[#bcbdfb] p-1.5 rounded-lg shadow-lg shadow-[#bcbdfb]/30">
        <span class="material-symbols-outlined text-white text-xl block">search_insights</span>
      </div>
      <span class="text-lg font-black text-slate-800">JobSpy</span>
    </a>
    <nav class="hidden md:flex items-center gap-8">
      <a href="index.html"   class="text-sm font-semibold text-slate-500 hover:text-[#bcbdfb] transition-colors">Dashboard</a>
      <a href="scraper.html" class="text-sm font-semibold text-slate-500 hover:text-[#bcbdfb] transition-colors">Scraper</a>
      <a href="history.html" class="text-sm font-bold text-[#bcbdfb] border-b-2 border-[#bcbdfb] pb-0.5">History</a>
      <a href="#"            class="text-sm font-semibold text-slate-500 hover:text-[#bcbdfb] transition-colors">Settings</a>
    </nav>
    <div class="flex items-center gap-3">
      <button class="p-2 text-slate-400 hover:text-[#bcbdfb] hover:bg-indigo-50 rounded-lg transition-all">
        <span class="material-symbols-outlined">notifications</span>
      </button>
      <div class="w-9 h-9 rounded-full bg-gradient-to-br from-[#bcbdfb] to-indigo-400 flex items-center justify-center text-white font-bold text-sm">A</div>
    </div>
  </div>
</header>

<!-- ── Main ───────────────────────────────────────────────────────────────── -->
<main class="max-w-7xl mx-auto px-6 py-8">

  <!-- Page header -->
  <div class="flex items-start justify-between mb-8">
    <div>
      <h1 class="text-3xl font-black text-slate-900 tracking-tight">Scrape History</h1>
      <p id="subtitle" class="text-slate-500 mt-1">Track and manage your past search sessions</p>
    </div>
    <a href="scraper.html"
      class="flex items-center gap-2 bg-[#bcbdfb] hover:bg-indigo-400 text-slate-900 font-bold px-5 py-2.5 rounded-xl shadow-md shadow-[#bcbdfb]/30 transition-all hover:scale-105">
      <span class="material-symbols-outlined text-sm">add</span>
      New Scrape
    </a>
  </div>

  <!-- Search + Filters bar -->
  <div class="bg-white rounded-2xl border border-indigo-50 shadow-sm px-5 py-4 mb-6 flex flex-wrap gap-3 items-center">
    <div class="flex-1 min-w-[200px] relative">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">search</span>
      <input id="history-search" type="text" placeholder="Search by job title or keywords..."
        class="w-full pl-9 pr-4 py-2 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-[#bcbdfb]/50 focus:border-[#bcbdfb] outline-none"/>
    </div>
    <select id="filter-status" class="text-sm border border-slate-200 rounded-xl px-3 py-2 focus:ring-2 focus:ring-[#bcbdfb]/50 outline-none">
      <option value="">All Sites</option>
      <option value="linkedin">LinkedIn</option>
      <option value="indeed">Indeed</option>
      <option value="glassdoor">Glassdoor</option>
      <option value="google">Google</option>
      <option value="zip_recruiter">ZipRecruiter</option>
    </select>
    <select id="filter-period" class="text-sm border border-slate-200 rounded-xl px-3 py-2 focus:ring-2 focus:ring-[#bcbdfb]/50 outline-none">
      <option value="">All Time</option>
      <option value="7">Last 7 Days</option>
      <option value="30">Last 30 Days</option>
      <option value="90">Last 90 Days</option>
    </select>
    <button onclick="loadSessions()" class="p-2 border border-slate-200 rounded-xl hover:border-[#bcbdfb] hover:text-[#bcbdfb] text-slate-400 transition-colors">
      <span class="material-symbols-outlined text-sm">refresh</span>
    </button>
  </div>

  <!-- Loading state -->
  <div id="loading-state" class="flex flex-col items-center justify-center py-20">
    <div class="spinner mb-4"></div>
    <p class="text-slate-500 font-medium">Loading history...</p>
  </div>

  <!-- Empty state -->
  <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-center">
    <span class="material-symbols-outlined text-7xl text-slate-200 block mb-4">history</span>
    <h3 class="text-xl font-bold text-slate-600 mb-2">No scrape history yet</h3>
    <p class="text-slate-400 mb-6">Run your first scrape to see it appear here</p>
    <a href="scraper.html"
      class="bg-[#bcbdfb] text-slate-900 font-bold px-6 py-3 rounded-xl hover:bg-indigo-400 transition-all">
      Start First Scrape
    </a>
  </div>

  <!-- Sessions grid -->
  <div id="sessions-grid" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>

  <!-- Pagination -->
  <div id="pagination" class="hidden flex items-center justify-center gap-2 mt-8">
    <button id="btn-prev" onclick="changePage(-1)"
      class="px-4 py-2 rounded-xl border border-slate-200 text-sm font-bold hover:border-[#bcbdfb] hover:text-[#bcbdfb] disabled:opacity-40 transition-colors">
      ← Prev
    </button>
    <div id="page-numbers" class="flex gap-1"></div>
    <button id="btn-next" onclick="changePage(1)"
      class="px-4 py-2 rounded-xl border border-slate-200 text-sm font-bold hover:border-[#bcbdfb] hover:text-[#bcbdfb] disabled:opacity-40 transition-colors">
      Next →
    </button>
  </div>
</main>

<!-- ── Re-run modal ────────────────────────────────────────────────────────── -->
<div id="rerun-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6">
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-black text-slate-900">Re-run Session</h3>
      <button onclick="document.getElementById('rerun-modal').classList.add('hidden')"
        class="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-100">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div id="modal-details" class="mb-5 text-sm text-slate-600 space-y-2"></div>
    <div class="flex gap-3">
      <button onclick="document.getElementById('rerun-modal').classList.add('hidden')"
        class="flex-1 py-2.5 border border-slate-200 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-50 transition-colors">
        Cancel
      </button>
      <button id="btn-confirm-rerun"
        class="flex-1 py-2.5 bg-[#bcbdfb] hover:bg-indigo-400 rounded-xl text-sm font-bold text-slate-900 transition-all">
        Launch Same Search
      </button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
let allSessions = [], filteredSessions = [];
let currentPage = 0, pageSize = 9;
let pendingRerun = null;

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  await loadSessions();

  let searchTimer;
  document.getElementById('history-search').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(applyFilters, 250);
  });
  document.getElementById('filter-status').addEventListener('change', applyFilters);
  document.getElementById('filter-period').addEventListener('change', applyFilters);

  document.getElementById('btn-confirm-rerun').addEventListener('click', () => {
    if (!pendingRerun) return;
    const s = pendingRerun;
    const params = new URLSearchParams();
    if (s.search_term)    params.set('search_term', s.search_term);
    if (s.location)       params.set('location', s.location);
    if (s.site_names)     params.set('site_names', s.site_names);
    if (s.results_wanted) params.set('results_wanted', s.results_wanted);
    if (s.hours_old)      params.set('hours_old', s.hours_old);
    window.location.href = 'scraper.html?' + params.toString();
  });
}

async function loadSessions() {
  showLoading();
  try {
    const data = await API.fetchSessions(100, 0);
    allSessions = data.sessions || [];
    applyFilters();
    updateSubtitle();
  } catch {
    showEmpty();
    document.getElementById('subtitle').textContent = 'Could not load sessions — is the backend running?';
  }
}

function applyFilters() {
  const search = document.getElementById('history-search').value.toLowerCase();
  const siteFil = document.getElementById('filter-status').value;
  const dayFil  = parseInt(document.getElementById('filter-period').value) || 0;
  const cutoff  = dayFil ? Date.now() - dayFil * 86400000 : 0;

  filteredSessions = allSessions.filter(s => {
    if (search && !(s.search_term || '').toLowerCase().includes(search)) return false;
    if (siteFil && !(s.site_names || '').includes(siteFil)) return false;
    if (cutoff && new Date(s.created_at) < cutoff) return false;
    return true;
  });

  currentPage = 0;
  renderPage();
}

function renderPage() {
  if (!filteredSessions.length) { showEmpty(); return; }

  const start = currentPage * pageSize;
  const page  = filteredSessions.slice(start, start + pageSize);
  const grid  = document.getElementById('sessions-grid');

  grid.innerHTML = page.map(s => sessionCardHTML(s)).join('');
  showGrid();
  renderPagination();
}

function sessionCardHTML(s) {
  const sites = (s.site_names || '').split(',').filter(Boolean);
  const isComplete = !!s.results_returned;
  const statusCls  = isComplete
    ? 'bg-emerald-100 text-emerald-700'
    : 'bg-amber-100 text-amber-700';
  const statusLabel = isComplete ? 'Completed' : 'Partial';

  const dateStr = s.created_at
    ? new Date(s.created_at).toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' })
    : '';

  return `
    <div class="session-card bg-white rounded-2xl border border-slate-100 shadow-sm p-5 transition-all">
      <div class="flex items-start justify-between mb-3">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 bg-indigo-50 rounded-xl flex items-center justify-center">
            <span class="material-symbols-outlined text-[#bcbdfb] text-sm">work_history</span>
          </div>
        </div>
        <span class="text-xs font-bold px-2 py-0.5 rounded-full ${statusCls}">${statusLabel}</span>
      </div>
      <h3 class="font-black text-slate-900 text-base leading-tight">${s.search_term || '(no keyword)'}</h3>
      ${s.location ? `<p class="text-xs text-slate-500 mt-0.5 flex items-center gap-1"><span class="material-symbols-outlined text-[10px]">location_on</span>${s.location}</p>` : ''}
      ${dateStr ? `<p class="text-xs text-slate-400 mt-0.5">📅 ${dateStr}</p>` : ''}

      <div class="mt-4 space-y-2">
        <div class="flex items-center justify-between text-sm bg-slate-50 rounded-xl px-3 py-2">
          <span class="text-slate-500 font-medium">Jobs Found</span>
          <span class="font-black text-slate-800">${s.results_returned ?? '—'}</span>
        </div>
        <div class="flex items-center justify-between text-sm bg-slate-50 rounded-xl px-3 py-2">
          <span class="text-slate-500 font-medium">Results Wanted</span>
          <span class="font-bold text-[#bcbdfb]">${s.results_wanted ?? '—'}</span>
        </div>
      </div>

      ${sites.length ? `
      <div class="mt-4">
        <p class="text-xs font-bold text-slate-400 uppercase tracking-wide mb-2">Targeted Sites</p>
        <div class="flex flex-wrap gap-1">
          ${sites.map(site => fmt.siteBadge(site)).join('')}
        </div>
      </div>` : ''}

      <button onclick="openRerun(${JSON.stringify(s).replace(/"/g,'&quot;')})"
        class="mt-4 w-full flex items-center justify-center gap-2 py-2.5 border-2 border-[#bcbdfb]/40 hover:border-[#bcbdfb] hover:bg-indigo-50 text-[#bcbdfb] font-bold rounded-xl text-sm transition-all">
        <span class="material-symbols-outlined text-sm">refresh</span>
        Re-run Session
      </button>
    </div>
  `;
}

function openRerun(session) {
  pendingRerun = session;
  const sites = (session.site_names || '').split(',').filter(Boolean);
  document.getElementById('modal-details').innerHTML = `
    <div class="space-y-2">
      <div class="flex gap-2"><span class="font-bold w-28 text-slate-500">Keyword:</span><span>${session.search_term || '—'}</span></div>
      <div class="flex gap-2"><span class="font-bold w-28 text-slate-500">Location:</span><span>${session.location || '—'}</span></div>
      <div class="flex gap-2"><span class="font-bold w-28 text-slate-500">Sites:</span><span>${sites.map(s => fmt.siteBadge(s)).join(' ')}</span></div>
      <div class="flex gap-2"><span class="font-bold w-28 text-slate-500">Results:</span><span>${session.results_wanted ?? '25'} wanted</span></div>
      ${session.hours_old ? `<div class="flex gap-2"><span class="font-bold w-28 text-slate-500">Hours old:</span><span>${session.hours_old}h</span></div>` : ''}
    </div>
  `;
  document.getElementById('rerun-modal').classList.remove('hidden');
}

function renderPagination() {
  const totalPages = Math.ceil(filteredSessions.length / pageSize);
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.classList.add('hidden'); return; }
  pag.classList.remove('hidden');

  document.getElementById('btn-prev').disabled = currentPage === 0;
  document.getElementById('btn-next').disabled = currentPage >= totalPages - 1;

  const nums = document.getElementById('page-numbers');
  nums.innerHTML = Array.from({length: totalPages}, (_, i) => `
    <button onclick="goPage(${i})"
      class="w-9 h-9 rounded-xl text-sm font-bold transition-all ${i === currentPage
        ? 'bg-[#bcbdfb] text-slate-900'
        : 'border border-slate-200 text-slate-600 hover:border-[#bcbdfb] hover:text-[#bcbdfb]'}">
      ${i + 1}
    </button>
  `).join('');
}

function changePage(dir) {
  const total = Math.ceil(filteredSessions.length / pageSize);
  currentPage = Math.max(0, Math.min(total - 1, currentPage + dir));
  renderPage();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function goPage(n) { currentPage = n; renderPage(); }

function updateSubtitle() {
  document.getElementById('subtitle').textContent =
    `Track and manage your past ${allSessions.length} search sessions`;
}

function showLoading() {
  document.getElementById('loading-state').classList.remove('hidden');
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('sessions-grid').classList.add('hidden');
  document.getElementById('pagination').classList.add('hidden');
}
function showEmpty() {
  document.getElementById('loading-state').classList.add('hidden');
  document.getElementById('empty-state').classList.remove('hidden');
  document.getElementById('sessions-grid').classList.add('hidden');
  document.getElementById('pagination').classList.add('hidden');
}
function showGrid() {
  document.getElementById('loading-state').classList.add('hidden');
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('sessions-grid').classList.remove('hidden');
}

init();
</script>
</body>
</html>
